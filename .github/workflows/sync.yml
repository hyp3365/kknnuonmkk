name: 同步多个文件（最终优化版）

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码（完整克隆）
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 配置 Git 用户信息
        run: |
          git config --global user.name "sync-bot"
          git config --global user.email "sync-bot@example.com"

      - name: 下载并拉取更新
        run: |
          added=0
          updated=0
          skipped=0
          failed=0
          logfile="sync.log"

          echo "==== 同步运行开始 $(date '+%Y-%m-%d %H:%M:%S') ====" >> $logfile

          while IFS=" " read -r filename url; do
            if [ -z "$filename" ] || [ -z "$url" ]; then
              echo "⚠️ 跳过空行或格式错误：$filename $url"
              echo "⚠️ 跳过空行或格式错误：$filename $url" >> $logfile
              skipped=$((skipped+1))
              continue
            fi

            echo "📥 正在下载 $filename 来自 $url ..."
            if ! curl -fsSL -H "Cache-Control: no-cache" -o "$filename" "$url"; then
              echo "❌ 下载失败：$filename"
              echo "❌ 下载失败：$filename" >> $logfile
              failed=$((failed+1))
              continue
            fi

            if [ ! -s "$filename" ]; then
              echo "⚠️ 文件为空，跳过：$filename"
              echo "⚠️ 文件为空，跳过：$filename" >> $logfile
              skipped=$((skipped+1))
              rm -f "$filename"
              continue
            fi

            if ! git ls-files --error-unmatch "$filename" >/dev/null 2>&1; then
              echo "📁 新文件：$filename"
              echo "📁 新文件：$filename" >> $logfile
              git add "$filename"
              git commit -m "新增同步文件 $filename"
              added=$((added+1))
            elif ! git diff --quiet "$filename"; then
              echo "🔄 文件有变化：$filename"
              echo "🔄 文件有变化：$filename" >> $logfile
              git add "$filename"
              git commit -m "自动同步 $filename 文件"
              updated=$((updated+1))
            else
              echo "✅ 文件无变化：$filename"
              echo "✅ 文件无变化：$filename" >> $logfile
              skipped=$((skipped+1))
            fi
          done < files.txt

          echo "📊 同步统计结果：" | tee -a $logfile
          echo "新增文件：$added 个" | tee -a $logfile
          echo "更新文件：$updated 个" | tee -a $logfile
          echo "跳过文件：$skipped 个" | tee -a $logfile
          echo "下载失败：$failed 个" | tee -a $logfile
          echo "==== 同步运行结束 ====" >> $logfile

          git add $logfile
          git commit -m "更新同步日志 $(date '+%Y-%m-%d %H:%M:%S')" || echo "没有日志更新需要提交"

      - name: 推送更新
        run: git push
