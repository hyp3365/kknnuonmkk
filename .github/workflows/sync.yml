name: 同步多个文件（支持新文件提交）

on:
  workflow_dispatch:         # 手动触发
  schedule:
    - cron: "0 */12 * * *"   # 每12小时运行一次

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v3

      - name: 下载并检测更新
        run: |
          while IFS=" " read -r filename url; do
            if [ -n "$filename" ] && [ -n "$url" ]; then
              echo "正在下载 $filename 来自 $url ..."
              curl -H "Cache-Control: no-cache" -o "$filename" "$url"

              if [ ! -f ".git/$filename" ] && [ -f "$filename" ]; then
                # 新文件：仓库里没有，但下载成功
                git add "$filename"
                git commit -m "新增同步文件 $filename"
              elif ! git diff --quiet "$filename"; then
                # 已有文件且有变化
                git add "$filename"
                git commit -m "自动同步 $filename 文件"
              else
                echo "$filename 没有变化，跳过提交"
              fi
            fi
          done < files.txt

      - name: 推送更新
        run: |
          git push
