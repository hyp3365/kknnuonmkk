name: 同步多个文件（支持无后缀）

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v3

      - name: 下载并检测更新
        run: |
          while IFS=" " read -r filename url; do
            if [ -n "$filename" ] && [ -n "$url" ]; then
              echo "正在下载 $filename 来自 $url ..."
              curl -H "Cache-Control: no-cache" -o "$filename" "$url"
              # 检查文件是否有变化
              if ! git diff --quiet "$filename"; then
                git add "$filename"
                git commit -m "自动同步 $filename 文件"
              else
                echo "$filename 没有变化，跳过提交"
              fi
            fi
          done < files.txt

      - name: 推送更新
        run: |
          git push
