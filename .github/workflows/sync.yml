name: 同步多个文件（增强版，无推送）

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"   # 默认每天同步一次（可被 files.txt 顶部覆盖）

# 🔒 并发锁：避免重复运行
concurrency:
  group: sync-files
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库代码（完整克隆）
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 配置 Git 用户信息
        run: |
          git config --global user.name "sync-bot"
          git config --global user.email "sync-bot@example.com"

      - name: 下载并同步文件（增强版）
        id: sync
        run: |
          set -e

          mkdir -p filer

          added=0
          updated=0
          skipped=0
          failed=0
          logfile="sync.log"
          report="sync_report.md"

          echo "==== 同步运行开始 $(date '+%Y-%m-%d %H:%M:%S') ====" >> "$logfile"

          # 读取 files.txt 顶部的 SYNC_CRON 配置
          SYNC_CRON=""
          while read -r line; do
            line="$(echo "$line" | sed 's/^[ \t]*//;s/[ \t]*$//')"
            [[ -z "$line" ]] && continue

            if [[ "$line" =~ ^#\ *SYNC_CRON= ]]; then
              SYNC_CRON=$(echo "$line" | sed 's/^#\ *SYNC_CRON=//')
              break
            fi

            [[ ! "$line" =~ ^# ]] && break
          done < files.txt

          echo "📅 当前同步时间配置：${SYNC_CRON:-未设置}" | tee -a "$logfile"

          # Markdown 报告头部
          echo "# 同步报告" > "$report"
          echo "运行时间：$(date '+%Y-%m-%d %H:%M:%S')" >> "$report"
          echo "" >> "$report"
          echo "| 文件 | 描述 | 状态 |" >> "$report"
          echo "|------|------|------|" >> "$report"

          retry_download() {
            url="$1"
            out="$2"
            for i in 1 2 3; do
              if curl -fsSL -H "Cache-Control: no-cache" -o "$out" "$url"; then
                return 0
              fi
              sleep 2
            done
            return 1
          }

          while read -r line; do
            # 去掉首尾空白
            line="$(echo "$line" | sed 's/^[ \t]*//;s/[ \t]*$//')"

            # 跳过空行和注释
            [[ -z "$line" || "$line" =~ ^# ]] && continue

            # 压缩多个空白为一个空格
            line="$(echo "$line" | tr -s '[:space:]' ' ')"

            # 解析字段：name format desc url
            outname=$(echo "$line" | cut -d ' ' -f1)
            outformat=$(echo "$line" | cut -d ' ' -f2)
            desc=$(echo "$line" | cut -d ' ' -f3)
            url=$(echo "$line" | cut -d ' ' -f4-)

            # 默认值处理
            [[ "$outname" == "-" ]] && outname=""
            [[ "$outformat" == "-" ]] && outformat=""
            [[ "$desc" == "-" ]] && desc=""

            tmp="filer/tmpfile"
            # 清洗 URL
            url="$(echo "$url" | tr -d '\r' | tr -d '\n' | sed 's/^[ \t]*//;s/[ \t]*$//')"
            echo "📥 正在下载：$url" | tee -a "$logfile"


            # URL 健康状态目录
mkdir -p .url_status
status_file=".url_status/${final_name}.fail"

# 下载失败处理
if ! retry_download "$url" "$tmp"; then
  echo "❌ 下载失败：$url" | tee -a "$logfile"

  # 记录失败次数
  if [ -f "$status_file" ]; then
    fails=$(cat "$status_file")
    fails=$((fails+1))
  else
    fails=1
  fi
  echo "$fails" > "$status_file"

  # 连续七天失败标记
  if [ "$fails" -ge 7 ]; then
    echo "⚠️ URL 已连续 $fails 天无法访问：$url" | tee -a "$logfile"
    echo "| ${final_name}.${final_ext} | $desc | ⚠️ 连续 ${fails} 天失败 |" >> "$report"
  else
    echo "| ${final_name}.${final_ext} | $desc | ❌ 下载失败（累计 ${fails} 次） |" >> "$report"
  fi

  failed=$((failed+1))
  continue
fi

# 如果成功下载 → 清除失败记录
rm -f "$status_file"

            # 原始文件名和格式
            basename=$(basename "$url")
            orig_name="${basename%.*}"
            orig_ext="${basename##*.}"

            # 最终名字
            final_name="${outname:-$orig_name}"

            # 最终格式
            final_ext="${outformat:-$orig_ext}"

            # 最终输出路径
            target="filer/${final_name}.${final_ext}"

            # 空文件检查
            if [ ! -s "$tmp" ]; then
              echo "⚠️ 文件为空：$url" | tee -a "$logfile"
              echo "| ${final_name}.${final_ext} | $desc | ⚠️ 空文件 |" >> "$report"
              skipped=$((skipped+1))
              rm -f "$tmp"
              continue
            fi

            # 判断是否为新文件
            if ! git ls-files --error-unmatch "$target" >/dev/null 2>&1; then
              mv "$tmp" "$target"
              echo "📁 新文件：$target" | tee -a "$logfile"
              echo "| ${final_name}.${final_ext} | $desc | 🆕 新增 |" >> "$report"
              git add "$target"
              git commit -m "新增同步文件 $target（$desc）"
              added=$((added+1))
              continue
            fi

            # 判断是否有变化
            if ! diff -q "$tmp" "$target" >/dev/null 2>&1; then
              mv "$tmp" "$target"
              echo "🔄 文件更新：$target" | tee -a "$logfile"
              echo "| ${final_name}.${final_ext} | $desc | 🔄 更新 |" >> "$report"
              git add "$target"
              git commit -m "自动同步更新 $target（$desc）"
              updated=$((updated+1))
            else
              echo "✅ 无变化：$target" | tee -a "$logfile"
              echo "| ${final_name}.${final_ext} | $desc | ✅ 无变化 |" >> "$report"
              skipped=$((skipped+1))
              rm -f "$tmp"
            fi

          done < files.txt

          echo "" >> "$report"
          echo "## 统计" >> "$report"
          echo "- 新增：$added" >> "$report"
          echo "- 更新：$updated" >> "$report"
          echo "- 跳过：$skipped" >> "$report"
          echo "- 失败：$failed" >> "$report"

          echo "==== 同步运行结束 ====" >> "$logfile"

          git add "$logfile" "$report"
          git commit -m "更新同步日志与报告 $(date '+%Y-%m-%d %H:%M:%S')" || true

      - name: 推送更新
        run: |
          git pull --rebase --autostash || true
          git push
