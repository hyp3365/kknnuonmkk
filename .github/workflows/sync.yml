name: 同步多个文件（增强版，含失败计数持久化）

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

concurrency:
  group: sync-files
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库代码（完整克隆）
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 配置 Git 用户信息
        run: |
          git config --global user.name "sync-bot"
          git config --global user.email "sync-bot@example.com"

      - name: 下载并同步文件（增强版）
        run: |
          export TZ="Asia/Shanghai"
          set -e

          mkdir -p filer
          mkdir -p .url_status

          added=0
          updated=0
          skipped=0
          failed=0

          logfile="sync.log"
          report="sync_report.md"

          echo "==== 同步运行开始 $(date '+%Y-%m-%d %H:%M:%S') ====" >> "$logfile"

          retry_download() {
            url="$1"
            out="$2"
            for i in 1 2 3; do
              if curl -fsSL -A "Mozilla/5.0" -H "Cache-Control: no-cache" -o "$out" "$url"; then
                return 0
              fi
              sleep 2
            done
            return 1
          }

          while read -r line; do
            line="$(echo "$line" | sed 's/^[ \t]*//;s/[ \t]*$//')"
            [[ -z "$line" || "$line" =~ ^# ]] && continue

            line="$(echo "$line" | tr -s '[:space:]' ' ')"

            outname=$(echo "$line" | cut -d ' ' -f1)
            outformat=$(echo "$line" | cut -d ' ' -f2)
            desc=$(echo "$line" | cut -d ' ' -f3)
            url=$(echo "$line" | cut -d ' ' -f4-)

            tmp="filer/tmpfile"

            echo "📥 正在下载：$url" | tee -a "$logfile"

            basename=$(basename "$url")

            # ★★★ 修复 URL 无扩展名导致 Ace.Ace
            if [[ "$basename" == *.* ]]; then
              orig_name="${basename%.*}"
              orig_ext="${basename##*.}"
            else
              orig_name="$basename"
              orig_ext=""
            fi

            final_name="${outname:-$orig_name}"
            final_ext="$outformat"   # ★★★ 永远使用 files.txt 的格式，不再从 URL 推断

            target="filer/${final_name}.${final_ext}"
            status_file=".url_status/${final_name}.fail"

            if ! retry_download "$url" "$tmp"; then
              echo "❌ 下载失败：$url" | tee -a "$logfile"
              fails=$(( $(cat "$status_file" 2>/dev/null || echo 0) + 1 ))
              echo "$fails" > "$status_file"
              failed=$((failed+1))
              continue
            fi

            rm -f "$status_file"

            if [ ! -s "$tmp" ]; then
              skipped=$((skipped+1))
              rm -f "$tmp"
              continue
            fi

            if ! git ls-files --error-unmatch "$target" >/dev/null 2>&1; then
              mv "$tmp" "$target"
              git add "$target"
              git commit -m "新增同步文件 $target"
              added=$((added+1))
              continue
            fi

            if ! diff -q "$tmp" "$target" >/dev/null 2>&1; then
              mv "$tmp" "$target"
              git add "$target"
              git commit -m "自动同步更新 $target"
              updated=$((updated+1))
            else
              skipped=$((skipped+1))
              rm -f "$tmp"
            fi

          done < files.txt

      - name: 推送更新
        run: |
          git pull --rebase --autostash || true
          git push
