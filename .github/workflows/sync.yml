name: Sync Files

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run sync script
        run: |
          set -e

          mkdir -p filer
          mkdir -p .url_status

          REPORT="sync_report.md"
          echo "# Sync Report" > "$REPORT"
          echo "" >> "$REPORT"
          echo "Generated at: $(date '+%Y-%m-%d %H:%M:%S')" >> "$REPORT"
          echo "" >> "$REPORT"

          while IFS= read -r line; do
            [[ -z "$line" || "$line" =~ ^# ]] && continue

            filename=$(echo "$line" | awk '{print $1}')
            ext=$(echo "$line" | awk '{print $2}')
            desc=$(echo "$line" | awk '{print $3}')
            url=$(echo "$line" | awk '{print $4}')

            filepath="filer/${filename}.${ext}"
            status_file=".url_status/${filename}.fail"

            retry_download() {
              for i in {1..3}; do
                if curl -fsSL "$url" -o "$filepath.tmp"; then
                  return 0
                fi
                sleep 2
              done
              return 1
            }

            if retry_download; then
              new_size=$(stat -c%s "$filepath.tmp")
              size_human=$(numfmt --to=iec "$new_size")

              if [[ ! -f "$filepath" ]] || ! cmp -s "$filepath" "$filepath.tmp"; then
                mv "$filepath.tmp" "$filepath"
                echo "$filename | $desc | Updated ($size_human)" >> "$REPORT"
              else
                rm -f "$filepath.tmp"
                echo "$filename | $desc | No change" >> "$REPORT"
              fi

              rm -f "$status_file"

            else
              fail_count=0
              [[ -f "$status_file" ]] && fail_count=$(cat "$status_file")
              fail_count=$((fail_count + 1))
              echo "$fail_count" > "$status_file"

              echo "$filename | $desc | FAILED ($fail_count times)" >> "$REPORT"
            fi

          done < files.txt

      - name: Commit and push changes
        run: |
          git add filer .url_status sync_report.md

          if ! git diff --cached --quiet; then
            git commit -m "Auto sync: $(date '+%Y-%m-%d %H:%M:%S')"
            git pull --rebase --autostash || true
            git push
          else
            echo "No changes to commit."
          fi
